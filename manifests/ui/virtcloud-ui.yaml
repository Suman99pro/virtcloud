# =============================================================================
# VirtCloud UI — Kubernetes Deployment
# Deploys the VM management dashboard as a pod
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: virtcloud-ui

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: virtcloud-ui-html
  namespace: virtcloud-ui
data:
  # Mount the index.html via ConfigMap (for small deployments)
  # For production: build a proper Docker image with the UI
  nginx.conf: |
    server {
      listen 8080;
      root /usr/share/nginx/html;
      index index.html;
      location / { try_files $uri /index.html; }
      server_tokens off;
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtcloud-ui
  namespace: virtcloud-ui
  labels:
    app: virtcloud-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: virtcloud-ui
  template:
    metadata:
      labels:
        app: virtcloud-ui
    spec:
      containers:
        - name: ui
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: html
          hostPath:
            path: /opt/virtcloud-ui    # Copy index.html here on each node
            type: DirectoryOrCreate
        - name: nginx-conf
          configMap:
            name: virtcloud-ui-html
            items:
              - key: nginx.conf
                path: nginx.conf

---
apiVersion: v1
kind: Service
metadata:
  name: virtcloud-ui
  namespace: virtcloud-ui
spec:
  type: NodePort
  selector:
    app: virtcloud-ui
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080    # Access at http://<ANY_NODE_IP>:30080
