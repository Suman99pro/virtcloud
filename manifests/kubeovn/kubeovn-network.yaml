# =============================================================================
# VirtCloud — KubeOVN Network Configuration
# Apply  : kubectl apply -f manifests/kubeovn/kubeovn-network.yaml
# Requires: KubeOVN CNI installed (scripts/03-install-cni.sh with CNI_PLUGIN=kubeovn)
# =============================================================================

# ── VPC ───────────────────────────────────────────────────────────────────────
apiVersion: kubeovn.io/v1
kind: Vpc
metadata:
  name: virtcloud-vpc
spec:
  namespaces:
    - vms
    - default

---
# ── VM Subnet ─────────────────────────────────────────────────────────────────
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: vm-subnet
spec:
  vpc: virtcloud-vpc
  cidrBlock: 172.20.0.0/24
  gateway: 172.20.0.1
  protocol: IPv4
  namespaces:
    - vms
  excludeIps:
    - 172.20.0.1..172.20.0.10
  enableDHCP: true
  enableIPv6DHCP: false
  gatewayType: distributed

---
# ── IP Pool for VM assignment ─────────────────────────────────────────────────
apiVersion: kubeovn.io/v1
kind: IPPool
metadata:
  name: vm-ippool
spec:
  subnet: vm-subnet
  ips:
    - 172.20.0.50..172.20.0.100
  namespaces:
    - vms

---
# ── Multus NetworkAttachmentDefinition ───────────────────────────────────────
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovn-net
  namespace: vms
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ovn-kubernetes.io/subnet
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "ovn-net",
      "type": "kube-ovn",
      "server_socket": "/run/openvswitch/kube-ovn-daemon.sock",
      "provider": "ovn-net.vms.ovn",
      "subnet": "vm-subnet"
    }
