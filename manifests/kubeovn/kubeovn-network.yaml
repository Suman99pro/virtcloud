#   externalEgressGateway: 192.168.1.1

---
# ── Multus Network Attachment Definition for VMs ──────────────────────────────
# Allows VMs to attach directly to the OVN subnet
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovn-net
  namespace: vms
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ovn-kubernetes.io/subnet
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "ovn-net",
      "type": "kube-ovn",
      "server_socket": "/run/openvswitch/kube-ovn-daemon.sock",
      "provider": "ovn-net.vms.ovn",
      "subnet": "vm-subnet"
    }

---
# ── IP Pool for VM static assignment ──────────────────────────────────────────
apiVersion: kubeovn.io/v1
kind: IPPool
metadata:
  name: vm-ippool
spec:
  subnet: vm-subnet
  ips:
    - 172.20.0.50..172.20.0.100   # Pool for VMs
  namespaces:
    - vms
