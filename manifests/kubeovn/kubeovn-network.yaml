# =============================================================================
# VirtCloud — KubeOVN Network Configuration
# Creates: VM subnet, VPC, and Multus network attachment definitions
# =============================================================================

# ── VPC (Virtual Private Cloud) ───────────────────────────────────────────────
apiVersion: kubeovn.io/v1
kind: Vpc
metadata:
  name: virtcloud-vpc
spec:
  namespaces:
    - vms
    - default

---
# ── VM Subnet ──────────────────────────────────────────────────────────────────
# Dedicated subnet for virtual machines with DHCP enabled
apiVersion: kubeovn.io/v1
kind: Subnet
metadata:
  name: vm-subnet
spec:
  vpc: virtcloud-vpc
  cidrBlock: 172.20.0.0/24
  gateway: 172.20.0.1
  protocol: IPv4
  namespaces:
    - vms
  excludeIps:
    - 172.20.0.1..172.20.0.10   # Reserve gateway and infra IPs
  dhcpV4Options:
    # Optional: Set DNS servers for VMs
    options: "6,8.8.8.8,8.8.4.4"
  enableDHCP: true
  enableIPv6DHCP: false
  enableEcmp: false
  gatewayType: distributed

---
# ── External / Provider Network ───────────────────────────────────────────────
# Uncomment and configure for direct external access (flat network)
# apiVersion: kubeovn.io/v1
# kind: ProviderNetwork
# metadata:
