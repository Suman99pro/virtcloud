# =============================================================================
# VirtCloud — Additional VM Templates
# Templates for: Fedora 39, Debian 12, Rocky Linux 9, Alpine
# =============================================================================

# ─────────────────────────────────────────────────────────────────────────────
# FEDORA 39 VM
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: fedora-vm-01-boot
  namespace: vms
spec:
  source:
    http:
      url: "https://download.fedoraproject.org/pub/fedora/linux/releases/39/Cloud/x86_64/images/Fedora-Cloud-Base-39-1.5.x86_64.qcow2"
  pvc:
    accessModes: [ReadWriteOnce]
    resources:
      requests:
        storage: 20Gi
    storageClassName: openebs-hostpath
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: fedora-vm-01
  namespace: vms
  labels:
    virtcloud/os: fedora-39
spec:
  running: false
  template:
    metadata:
      labels:
        kubevirt.io/vm: fedora-vm-01
    spec:
      domain:
        cpu:
          cores: 2
        memory:
          guest: 4Gi
        resources:
          requests:
            memory: 4Gi
            cpu: "2"
        machine:
          type: q35
        devices:
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          disks:
            - name: boot-disk
              disk:
                bus: virtio
              bootOrder: 1
            - name: cloudinit-disk
              disk:
                bus: virtio
          rng: {}
      networks:
        - name: default
          pod: {}
      volumes:
        - name: boot-disk
          dataVolume:
            name: fedora-vm-01-boot
        - name: cloudinit-disk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              hostname: fedora-vm-01
              users:
                - name: fedora
                  sudo: ALL=(ALL) NOPASSWD:ALL
                  ssh_authorized_keys:
                    - ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... your-key-here
              packages:
                - qemu-guest-agent
              runcmd:
                - systemctl enable --now qemu-guest-agent

