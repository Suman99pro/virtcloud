# =============================================================================
# VirtCloud — Ubuntu 24.04 Virtual Machine (Production)
# Usage  : kubectl apply -f manifests/vms/ubuntu-vm.yaml
# SSH    : ssh ubuntu@<NODE_IP> -p 30022
# Console: virtctl console ubuntu-vm-01 -n vms
# =============================================================================
# Before applying:
#   1. Replace the SSH public key below with your actual key
#   2. Adjust cpu/memory/disk if needed
#   3. Set storageClassName to match your installed storage plugin
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: vms
  labels:
    app.kubernetes.io/managed-by: virtcloud

---
# ── Cloud-init Secret ─────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: ubuntu-vm-01-cloudinit
  namespace: vms
type: Opaque
stringData:
  userdata: |
    #cloud-config
    hostname: ubuntu-vm-01
    fqdn: ubuntu-vm-01.virtcloud.local
    manage_etc_hosts: true
    users:
      - name: ubuntu
        gecos: VirtCloud User
        sudo: ALL=(ALL) NOPASSWD:ALL
        shell: /bin/bash
        ssh_authorized_keys:
          - ssh-rsa AAAAB3NzaC1yc2EAAAADAQABAAABAQC... your-key-here
    packages:
      - qemu-guest-agent
      - curl
      - vim
      - htop
      - net-tools
    runcmd:
      - systemctl enable --now qemu-guest-agent
      - echo "VirtCloud VM ready" > /etc/motd

---
# ── DataVolume — downloads Ubuntu 24.04 cloud image ──────────────────────────
apiVersion: cdi.kubevirt.io/v1beta1
kind: DataVolume
metadata:
  name: ubuntu-vm-01-boot
  namespace: vms
spec:
  source:
    http:
      url: "https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img"
  pvc:
    accessModes:
      - ReadWriteOnce
    resources:
      requests:
        storage: 20Gi
    storageClassName: openebs-hostpath   # Change to: openebs-lvm | longhorn | rook-ceph-block

---
# ── VirtualMachine ────────────────────────────────────────────────────────────
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: ubuntu-vm-01
  namespace: vms
  labels:
    app: ubuntu-vm-01
    virtcloud/os: ubuntu-2404
spec:
  running: true

  template:
    metadata:
      labels:
        kubevirt.io/vm: ubuntu-vm-01
    spec:
      domain:
        cpu:
          cores: 2             # vCPU count
          threads: 1
          sockets: 1
          model: host-passthrough
        memory:
          guest: 4Gi
        resources:
          requests:
            memory: 4Gi
            cpu: "2"
          limits:
            memory: 4Gi
            cpu: "2"
        machine:
          type: q35
        firmware:
          bootloader:
            efi:
              secureBoot: false
        devices:
          interfaces:
            - name: default
              masquerade: {}
              model: virtio
          disks:
            - name: boot-disk
              disk:
                bus: virtio
              bootOrder: 1
            - name: cloudinit-disk
              disk:
                bus: virtio
          rng: {}

      networks:
        - name: default
          pod: {}

      volumes:
        - name: boot-disk
          dataVolume:
            name: ubuntu-vm-01-boot
        - name: cloudinit-disk
          cloudInitNoCloud:
            secretRef:
              name: ubuntu-vm-01-cloudinit

      readinessProbe:
        guestAgentPing: {}
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 10

---
# ── SSH NodePort ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: ubuntu-vm-01-ssh
  namespace: vms
spec:
  type: NodePort
  selector:
    kubevirt.io/vm: ubuntu-vm-01
  ports:
    - name: ssh
      port: 22
      targetPort: 22
      nodePort: 30022
      protocol: TCP
