# =============================================================================
# VirtCloud UI — Sandbox Deployment
# Reads ui/virtcloud-ui.html from a ConfigMap (no Docker image build needed)
# Created by: bootstrap.sh or deploy-ui.sh
# Access at : http://localhost:30080
# =============================================================================

apiVersion: v1
kind: Namespace
metadata:
  name: virtcloud-ui

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-conf
  namespace: virtcloud-ui
data:
  default.conf: |
    server {
        listen 8080;
        root /usr/share/nginx/html;
        index index.html;
        server_tokens off;
        location / { try_files $uri /index.html; }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: virtcloud-ui
  namespace: virtcloud-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: virtcloud-ui
  template:
    metadata:
      labels:
        app: virtcloud-ui
    spec:
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      nodeSelector:
        ingress-ready: "true"
      containers:
        - name: ui
          image: nginx:alpine
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
      volumes:
        - name: html
          configMap:
            name: virtcloud-ui-html   # Created by bootstrap.sh / deploy-ui.sh
        - name: nginx-conf
          configMap:
            name: nginx-conf
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: virtcloud-ui
  namespace: virtcloud-ui
spec:
  type: NodePort
  selector:
    app: virtcloud-ui
  ports:
    - port: 80
      targetPort: 8080
      nodePort: 30080
