# =============================================================================
# VirtCloud Sandbox — KinD Cluster Configuration
# 3 nodes: 1 control-plane + 2 workers
#
# Uses KinD's built-in kindnet CNI — no Flannel, no CNI conflicts,
# no subnet.env errors. kindnet works perfectly for sandbox purposes.
# =============================================================================

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: virtcloud-sandbox

nodes:
  - role: control-plane
    image: kindest/node:v1.30.0
    labels:
      ingress-ready: "true"
    extraPortMappings:
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP
      - containerPort: 30022
        hostPort: 30022
        protocol: TCP
      - containerPort: 31001
        hostPort: 31001
        protocol: TCP
    extraMounts:
      - hostPath: /tmp/virtcloud-sandbox/control-plane
        containerPath: /var/local-path-provisioner
        propagation: Bidirectional

  - role: worker
    image: kindest/node:v1.30.0
    labels:
      worker-id: "01"
    extraMounts:
      - hostPath: /tmp/virtcloud-sandbox/worker-01
        containerPath: /var/local-path-provisioner
        propagation: Bidirectional

  - role: worker
    image: kindest/node:v1.30.0
    labels:
      worker-id: "02"
    extraMounts:
      - hostPath: /tmp/virtcloud-sandbox/worker-02
        containerPath: /var/local-path-provisioner
        propagation: Bidirectional

networking:
  # kindnet is KinD's default CNI — stable, no extra install needed,
  # no subnet.env race conditions, pods get IPs immediately.
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
